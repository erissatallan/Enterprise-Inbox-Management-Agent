display_information:
  name: Enterprise Inbox Management Agent
  description: Policy-gated AI inbox automation for enterprise operations
  background_color: "#1F2937"
features:
  bot_user:
    display_name: Inbox Workflow Agent
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - chat:write
      - conversations:write
settings:
  event_subscriptions:
    request_url: https://YOUR_HOST/slack/events
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
